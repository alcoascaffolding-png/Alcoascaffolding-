# Render deployment configuration
# NOTE: The new Next.js admin panel (alcoa-admin/) is deployed to Vercel.
# Only the legacy Express backend is deployed here.
# The old admin-panel/ (Vite static site) has been replaced by the new Next.js app.
services:
  # Legacy Express Backend (kept running during Next.js migration overlap)
  # Once all API routes are migrated to Next.js Route Handlers,
  # this service can be decommissioned.
  - type: web
    name: alcoa-scaffolding-backend
    env: node
    rootDirectory: backend
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: Sales@alcoascaffolding.com
      - key: COMPANY_EMAIL
        value: sales@alcoascaffolding.com
      - key: SUPPORT_EMAIL
        value: sales@alcoascaffolding.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://alcoascaffolding.com
      - key: COMPANY_NAME
        value: Alcoa Aluminium Scaffolding
      - key: LOG_LEVEL
        value: info
      - key: TIMEZONE
        value: Asia/Dubai

  # DECOMMISSIONED: Old Vite static admin panel
  # Replaced by alcoa-admin/ Next.js app deployed to Vercel
